name: Deploy to Cloud Platform

on:
  workflow_call:
    inputs:
      namespace:
        required: true
        type: string
      dynamic_hostname:
        required: false
        default: "false"
        type: string
      ECR_REPOSITORY:
        required: true
        type: string
      HOST:
        required: true
        type: string

    secrets:
      KUBE_CERT:
        required: true
      KUBE_CLUSTER:
        required: true
      KUBE_NAMESPACE:
        required: true
      KUBE_TOKEN:
        required: true
      ECR_REGISTRY_URL:
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate with cluster
        shell: bash
        env:
          KUBE_CERT: ${{ inputs.KUBE_CERT }}
          KUBE_CLUSTER: ${{ inputs.KUBE_CLUSTER }}
          KUBE_TOKEN: ${{ inputs.KUBE_TOKEN }}
          KUBE_NAMESPACE: ${{ inputs.KUBE_NAMESPACE }}
        run: |
          echo "$KUBE_CERT" > ca.crt

          kubectl config set-cluster "$KUBE_CLUSTER" \
            --certificate-authority=./ca.crt \
            --server="https://$KUBE_CLUSTER"

          kubectl config set-credentials deploy-user \
            --token="$KUBE_TOKEN"

          kubectl config set-context "$KUBE_CLUSTER" \
            --cluster="$KUBE_CLUSTER" \
            --user=deploy-user \
            --namespace="$KUBE_NAMESPACE"

          kubectl config use-context "$KUBE_CLUSTER"

      - name: Set image tag and release info
        shell: bash
        env:
          DYNAMIC_HOSTNAME: ${{ inputs.dynamic_hostname }}
          HOST: ${{ inputs.HOST }}
          ECR_REGISTRY_URL: ${{ inputs.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ inputs.ECR_REPOSITORY }}
          KUBE_NAMESPACE: ${{ inputs.KUBE_NAMESPACE }}
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            IMAGE_TAG="main-${GITHUB_SHA}"
          else
            IMAGE_TAG="branch-${GITHUB_SHA}"
          fi

          CLEANED_BRANCH_NAME=$(
            echo "$BRANCH_NAME" |
            sed 's/^feature[-/]//' |
            sed 's:^[^/]*/::' |
            tr '[:upper:]' '[:lower:]' |
            tr ' _/[]().' '-' |
            tr -s '-' |
            cut -c1-28 |
            sed 's/-$//'
          )

          if [ "$DYNAMIC_HOSTNAME" = "true" ]; then
            RELEASE_NAME="$CLEANED_BRANCH_NAME"
            RELEASE_HOST="${RELEASE_NAME}-${HOST}"
          else
            RELEASE_NAME="cla-backend"
            RELEASE_HOST="$HOST"
          fi

          {
            echo "IMAGE_TAG=${IMAGE_TAG}"
            echo "RELEASE_NAME=${RELEASE_NAME}"
            echo "RELEASE_HOST=${RELEASE_HOST}"
            echo "DOCKER_REPOSITORY=${ECR_REGISTRY_URL}/${ECR_REPOSITORY}"
            echo "KUBE_NAMESPACE=${KUBE_NAMESPACE}"
          } >> "$GITHUB_ENV"

      - name: Get ingress cluster info
        shell: bash
        run: |
          echo "INGRESS_CLUSTER_NAME=$(kubectl get configmap ingress-cluster -o jsonpath='{.data.name}')" >> "$GITHUB_ENV"
          echo "INGRESS_CLUSTER_WEIGHT=$(kubectl get configmap ingress-cluster -o jsonpath='{.data.weight}')" >> "$GITHUB_ENV"

      - name: Fetch Pingdom IPs
        shell: bash
        run: |
          python3 -m pip install --quiet requests
          PINGDOM_IPS=$(python3 bin/pingdom_ips.py)
          echo "PINGDOM_IPS=${PINGDOM_IPS}" >> "$GITHUB_ENV"

      - name: Deploy
        shell: bash
        env:
          NAMESPACE: ${{ inputs.namespace }}
          DYNAMIC_HOSTNAME: ${{ inputs.dynamic_hostname }}
        run: |
          chmod +x ./bin/${NAMESPACE}_deploy.sh
          ./bin/${NAMESPACE}_deploy.sh "$DYNAMIC_HOSTNAME"