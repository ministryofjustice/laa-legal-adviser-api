name: Deploy Grafana Dashboards

inputs:
  namespace:
    description: Target namespace (staging, production)
    required: true
  dynamic_hostname:
    description: Use dynamic hostname based on branch name
    required: false
    default: 'false'
  KUBE_CERT:
    description: Kubernetes cluster certificate
    required: true
  KUBE_CLUSTER:
    description: Kubernetes cluster hostname
    required: true
  KUBE_NAMESPACE:
    description: Kubernetes namespace
    required: true
  KUBE_TOKEN:
    description: Kubernetes service account token
    required: true
  HOST:
    description: Base hostname for deployment
    required: true


jobs:
  deploy_grafana:
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate with cluster
      shell: bash
      env:
        KUBE_CERT: ${{ inputs.KUBE_CERT }}
        KUBE_CLUSTER: ${{ inputs.KUBE_CLUSTER }}
        KUBE_TOKEN: ${{ inputs.KUBE_TOKEN }}
        KUBE_NAMESPACE: ${{ inputs.KUBE_NAMESPACE }}
      run: |
        echo "$KUBE_CERT" > ca.crt
        kubectl config set-cluster "$KUBE_CLUSTER" \
          --certificate-authority=./ca.crt \
          --server="https://$KUBE_CLUSTER"
        kubectl config set-credentials deploy-user --token="$KUBE_TOKEN"
        kubectl config set-context "$KUBE_CLUSTER" \
          --cluster="$KUBE_CLUSTER" \
          --user=deploy-user \
          --namespace="$KUBE_NAMESPACE"
        kubectl config use-context "$KUBE_CLUSTER"


    - name: Deploy Grafana Dashboards
        run: |
          kubectl apply -f ./kubernetes_deploy/staging/ingress-dashboard.yml
          kubectl apply -f ./kubernetes_deploy/staging/pods-dashboard.yml