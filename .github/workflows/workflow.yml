name: Snyk Container Security Scan

on:
  pull_request:

jobs:
  build-and-scan:
    name: Scan Docker image for vulnerabilities
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.3

      - name: Generate image URI
        id: meta
        run: |
          IMAGE_URI="end-to-end-test"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image_uri }}" \
            -f behave/Dockerfile \
            behave

      - name: Install Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 #v1.0.0

      - name: Obtain short-lived Snyk token
        id: snyk-auth
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/snyk-auth@6db001458db30ae747d9eb8eb25707ce52b359bc # No versioning 
        with:
          client_id: ${{ secrets.SNYK_CLIENT_ID }}
          client_secret: ${{ secrets.SNYK_CLIENT_SECRET }}

      - name: Scan container image
        env:
            SNYK_OAUTH_TOKEN: ${{ steps.snyk-auth.outputs.token }}
            IMAGE_URI: ${{ steps.meta.outputs.image_uri }}
            MINIMUM_THRESHOLD: high
        run: |
          mkdir -p sarif

          snyk container test "$IMAGE_URI" \
            --severity-threshold=$MINIMUM_THRESHOLD \
            --sarif-file-output=sarif/snyk.sarif

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa #4.36.2 
        with:
          sarif_file: sarif/snyk.sarif