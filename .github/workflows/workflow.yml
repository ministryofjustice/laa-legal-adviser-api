name: Workflow to build, test and deploy application

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  Linting-and-unit-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: cimg/postgres:18.1-postgis
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports: ["5432:5432"]

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gdal-bin

      - name: Install Python dependencies
        run: pip install -U pip pre-commit coverage -r requirements/base.txt -r requirements/dev.txt

      - name: Run linting (pre-commit)
        run: pre-commit run --all-files

      - name: Run tests with coverage
        run: coverage run manage.py test

  build-and-push:
    name: Build and Push
    needs: [Linting-and-unit-test]
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write

    with:
      ECR_REGION: ${{vars.ECR_REGION}}
      ECR_REPOSITORY: ${{vars.ECR_REPOSITORY}}
    secrets:
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}

  snyk-image-scan:
    name: Snyk Image Scan
    needs: [build-and-push]
    if: always() #allowed to be passed for the error
    uses: ministryofjustice/laa-reusable-github-actions/.github/workflows/sast.yml@df9a4a8ad625a391c27ccf81a1c1a2d7b23e6474 # unversion
    permissions:
      id-token: write
      contents: read
      security-events: write
      actions: read
    with:
      image_uri: ${{ needs.build-and-push.outputs.image_uri }}
      dockerfile_path: ./Dockerfile
    secrets:
      SNYK_CLIENT_ID: ${{ secrets.SNYK_CLIENT_ID }}
      SNYK_CLIENT_SECRET: ${{ secrets.SNYK_CLIENT_SECRET }}
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}


  staging-deploy:
    name: Staging deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: ./.github/actions/deploy
        with:
          namespace: staging
          ECR_DEPLOY_IMAGE: ${{ needs.build-and-push.outputs.image_uri }}
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_NAMESPACE: ${{ secrets.K8_NAMESPACE }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          

  production-deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref_name == 'main'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: ./.github/actions/deploy
        with:
          namespace: production
          ECR_DEPLOY_IMAGE: ${{ needs.build-and-push.outputs.image_uri }}
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          HOST: ${{ vars.PRODUCTION_HOST }}

  deploy-grafana-staging:
    name: Deploy Grafana to Staging
    runs-on: ubuntu-latest
    needs: [staging-deploy]
    environment: staging
    timeout-minutes: 10 #time out for how long to rollback if failed
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: ./.github/actions/deploy-grafana
        with:
          namespace: ${{ secrets.KUBE_NAMESPACE }}
          environment_folder: staging
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}

  deploy-grafana-production:
      name: Deploy Grafana to production
      runs-on: ubuntu-latest
      needs: [production-deploy]
      environment: production
      timeout-minutes: 10 #time out for how long to rollback if failed
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        - uses: ./.github/actions/deploy-grafana
          with:
            namespace: ${{ secrets.KUBE_NAMESPACE }}
            environment_folder: production
            KUBE_CERT: ${{ secrets.KUBE_CERT }}
            KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
            KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
        

