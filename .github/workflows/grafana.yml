name: Deploy Grafana Dashboards

on:
  workflow_call:
    inputs:
      namespace:
        description: Target namespace (staging or production)
        required: true
        type: string

      dynamic_hostname:
        description: Use dynamic hostname based on branch name
        required: false
        type: string
        default: "false"

      host:
        description: Base hostname for deployment
        required: true
        type: string

jobs:
  deploy_grafana:
    runs-on: ubuntu-latest
    environment: ${{ inputs.namespace }}

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate with cluster
        shell: bash
        env:
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          echo "$KUBE_CERT" > ca.crt
          kubectl config set-cluster "$KUBE_CLUSTER" \
            --certificate-authority=./ca.crt \
            --server="https://$KUBE_CLUSTER"
          kubectl config set-credentials deploy-user --token="$KUBE_TOKEN"
          kubectl config set-context "$KUBE_CLUSTER" \
            --cluster="$KUBE_CLUSTER" \
            --user=deploy-user \
            --namespace="$KUBE_NAMESPACE"
          kubectl config use-context "$KUBE_CLUSTER"

      - name: Deploy Grafana Dashboards
        shell: bash
        env:
          NAMESPACE: ${{ inputs.namespace }}
        run: |
          kubectl apply -f ./kubernetes_deploy/${NAMESPACE}/ingress-dashboard.yml
          kubectl apply -f ./kubernetes_deploy/${NAMESPACE}/pods-dashboard.yml