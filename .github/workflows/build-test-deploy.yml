name: Build, test and deploy

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('requirements/lint.txt') }}

      - name: Install lint dependencies
        run: pip install --requirement requirements/lint.txt

      - name: Run flake8
        run: flake8 laalaa

      - name: Check formatting with black
        run: black --check --skip-string-normalization laalaa

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgis/postgis:18-3.5
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: laalaa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gdal-bin

      - name: Set up Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/pip
          key: pip-test-${{ hashFiles('requirements/base.txt', 'requirements/dev.txt') }}
          restore-keys: pip-test-

      - name: Install dependencies
        run: |
          pip install --requirement requirements/base.txt --requirement requirements/dev.txt
          pip check

      - name: Run tests
        env:
          DATABASE_URL: postgis://postgres:postgres@localhost/laalaa_test
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: |
          coverage run manage.py test --verbosity=2
          coverage report -m
          coverage html
          coveralls

      - name: Upload coverage report
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: coverage-report
          path: htmlcov/

  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/build-and-push
        with:
          ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ECR_REGION: ${{ vars.ECR_REGION }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

  image-security-scan:
    name: Image security scan
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up AWS credentials
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/ecr-auth@cb1ebcbca5efcd1e91b7ee1e27c73650c1bba9d8
        with:
          ecr_region: ${{ vars.ECR_REGION }}
          ecr_role: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          role-session-name: laa-legal-adviser-api

      - name: Set image tag
        id: image-tag
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=main-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=branch-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan for vulnerabilities (informative)
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: "${{ secrets.ECR_REGISTRY_URL }}/${{ vars.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }}"
          format: table
          exit-code: "0"
          severity: "UNKNOWN,LOW,MEDIUM,HIGH"

      - name: Scan for critical vulnerabilities
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: "${{ secrets.ECR_REGISTRY_URL }}/${{ vars.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }}"
          format: table
          exit-code: "1"
          severity: "CRITICAL"

  staging-deploy:
    name: Staging deploy
    runs-on: ubuntu-latest
    needs: [image-security-scan]
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/deploy
        with:
          namespace: staging
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

  deploy-grafana:
    name: Deploy Grafana dashboards
    runs-on: ubuntu-latest
    needs: [image-security-scan]
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate with cluster
        env:
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        run: |
          echo "$KUBE_CERT" | base64 -d > ca.crt
          kubectl config set-cluster "$KUBE_CLUSTER" \
            --certificate-authority=./ca.crt \
            --server="https://$KUBE_CLUSTER"
          kubectl config set-credentials deploy-user --token="$KUBE_TOKEN"
          kubectl config set-context "$KUBE_CLUSTER" \
            --cluster="$KUBE_CLUSTER" \
            --user=deploy-user \
            --namespace="$KUBE_NAMESPACE"
          kubectl config use-context "$KUBE_CLUSTER"

      - name: Deploy Grafana dashboards
        run: |
          kubectl apply -f kubernetes_deploy/staging/ingress-dashboard.yml
          kubectl apply -f kubernetes_deploy/staging/pods-dashboard.yml

  production-deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    needs: [image-security-scan]
    if: github.ref_name == 'main'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/deploy
        with:
          namespace: production
          KUBE_CERT: ${{ secrets.KUBE_CERT }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
