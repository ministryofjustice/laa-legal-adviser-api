name: Deploy to Cloud Platform
description: Deploys to a Cloud Platform Kubernetes namespace using kubectl

inputs:
  namespace:
    description: Target namespace (staging, production)
    required: true
  KUBE_CERT:
    description: Kubernetes cluster certificate (base64 encoded)
    required: true
  KUBE_CLUSTER:
    description: Kubernetes cluster hostname
    required: true
  KUBE_NAMESPACE:
    description: Kubernetes namespace
    required: true
  KUBE_TOKEN:
    description: Kubernetes service account token
    required: true
  ECR_REGISTRY_URL:
    description: ECR registry URL
    required: true
  ECR_REPOSITORY:
    description: ECR repository name
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Authenticate with cluster
      shell: bash
      env:
        KUBE_CERT: ${{ inputs.KUBE_CERT }}
        KUBE_CLUSTER: ${{ inputs.KUBE_CLUSTER }}
        KUBE_TOKEN: ${{ inputs.KUBE_TOKEN }}
        KUBE_NAMESPACE: ${{ inputs.KUBE_NAMESPACE }}
      run: |
        echo "$KUBE_CERT" | base64 -d > ca.crt
        kubectl config set-cluster "$KUBE_CLUSTER" \
          --certificate-authority=./ca.crt \
          --server="https://$KUBE_CLUSTER"
        kubectl config set-credentials deploy-user --token="$KUBE_TOKEN"
        kubectl config set-context "$KUBE_CLUSTER" \
          --cluster="$KUBE_CLUSTER" \
          --user=deploy-user \
          --namespace="$KUBE_NAMESPACE"
        kubectl config use-context "$KUBE_CLUSTER"
        kubectl --namespace="$KUBE_NAMESPACE" get pods

    - name: Set deploy image
      shell: bash
      env:
        ECR_REGISTRY_URL: ${{ inputs.ECR_REGISTRY_URL }}
        ECR_REPOSITORY: ${{ inputs.ECR_REPOSITORY }}
      run: |
        if [ "${GITHUB_REF_NAME}" = "main" ]; then
          IMAGE_TAG="main-${GITHUB_SHA}"
        else
          IMAGE_TAG="branch-${GITHUB_SHA}"
        fi
        echo "ECR_DEPLOY_IMAGE=${ECR_REGISTRY_URL}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_ENV"

    - name: Run pre-deploy jobs
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
        BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        NAMESPACE_DIR="kubernetes_deploy/${NAMESPACE}"
        COLLECT_STATIC="${NAMESPACE_DIR}/collect-static-job.yml"
        MIGRATE_DB="${NAMESPACE_DIR}/migrate-db-job.yml"

        for JOB in "$COLLECT_STATIC" "$MIGRATE_DB"; do
          echo "Running $JOB"
          kubectl delete -f "$JOB" --ignore-not-found
          cat "$JOB" | \
            kubectl set image app="$ECR_DEPLOY_IMAGE" --filename=/dev/stdin --local --output=yaml | \
            kubectl annotate kubernetes.io/change-cause="$BUILD_URL" --filename=/dev/stdin --local --output=yaml | \
            kubectl apply --filename=/dev/stdin
        done

        echo "Waiting for pre-deploy jobs..."
        if ! kubectl wait --for=condition=complete \
          -f "$COLLECT_STATIC" -f "$MIGRATE_DB" --timeout=180s; then
          echo "Failed pods:"
          kubectl get pods --field-selector=status.phase=Failed
          FIRST_POD=$(kubectl get pods --field-selector=status.phase=Failed -o=name | head -n 1)
          echo "Logs for failed pod ${FIRST_POD}:"
          kubectl logs "$FIRST_POD"
          exit 1
        fi

    - name: Apply ingress
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        NAMESPACE_DIR="kubernetes_deploy/${NAMESPACE}"
        if [ "$NAMESPACE" = "staging" ]; then
          CIDR_LAAI=$(curl -s https://raw.githubusercontent.com/ministryofjustice/laa-ip-allowlist/main/cidrs.txt \
            | tr -d ' ' | tr '\n' ',')
          CIDR_MONX=$(curl -s https://my.pingdom.com/probes/ipv4 \
            | sed 's/$/\/32/' | tr '\n' ',')
          EXTRA_FILE="${NAMESPACE_DIR}/extra-allowlist-cidrs.txt"
          CIDR_EXTRA=""
          if [ -f "$EXTRA_FILE" ]; then
            CIDR_EXTRA=$(tr -d ' ' < "$EXTRA_FILE" | tr '\n' ',')
          fi
          COMBINED_WHITELIST=$(printf "%s%s%s" "$CIDR_LAAI" "$CIDR_MONX" "$CIDR_EXTRA" \
            | sed 's/,,*/,/g; s/^,//; s/,$//')
          echo "Applying whitelist with $(echo "$COMBINED_WHITELIST" | grep -o ',' | wc -l) entries..."
          sed "s|WHITELIST_PLACEHOLDER|${COMBINED_WHITELIST}|g" "${NAMESPACE_DIR}/ingress.yml" | \
            kubectl apply -f -
        else
          kubectl apply -f "${NAMESPACE_DIR}/ingress.yml"
        fi

    - name: Deploy app
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
        BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        NAMESPACE_DIR="kubernetes_deploy/${NAMESPACE}"

        cat "${NAMESPACE_DIR}/deployment.yml" | \
          kubectl set image app="$ECR_DEPLOY_IMAGE" --filename=/dev/stdin --local --output=yaml | \
          kubectl annotate kubernetes.io/change-cause="$BUILD_URL" --filename=/dev/stdin --local --output=yaml | \
          kubectl apply \
            --filename=/dev/stdin \
            --filename="${NAMESPACE_DIR}/service.yml"

        cat "${NAMESPACE_DIR}/queue_worker_deployment.yml" | \
          kubectl set image worker="$ECR_DEPLOY_IMAGE" --filename=/dev/stdin --local --output=yaml | \
          kubectl annotate kubernetes.io/change-cause="$BUILD_URL" --filename=/dev/stdin --local --output=yaml | \
          kubectl apply --filename=/dev/stdin
